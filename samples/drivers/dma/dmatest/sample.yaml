sample:
  description: DMA direct mode transfer
  name: DMA driver sample
common:
  tags: drivers
  depends_on: dma
  harness: console
  harness_config:
    type: one_line
    regex:
      - "DMA transfer verified all on channels"
tests:
  sample.drivers.dma:
    integration_platforms:
      - versalnet_rpu
      - versal2_rpu

  sample.drivers.dma.scatter_gather:
    integration_platforms:
      - versalnet_rpu
      - versal2_rpu
    extra_configs:
      - CONFIG_DMA_TEST_SG_MODE=y
