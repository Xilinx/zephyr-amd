sample:
  description: Packet socket sample
  name: packet-socket
tests:
  sample.net.sockets.packet:
    platform_allow:
      - native_sim
      - native_sim/native/64
    integration_platforms:
      - native_sim
    tags:
      - net
      - sockets
      - packet-socket
    harness: console
    harness_config:
      type: multi_line
      ordered: true
      regex:
        - "Sent \\d+ bytes"
        - "Received \\d+ bytes"
