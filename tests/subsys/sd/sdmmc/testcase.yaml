common:
  depends_on: sdhc
  tags:
    - drivers
    - sdhc
tests:
  sd.sdmmc:
    harness: ztest
    harness_config:
      fixture: fixture_sdhc
    filter: dt_alias_exists("sdhc0")
    tags: sdhc
    min_ram: 32
    integration_platforms:
      - mimxrt1064_evk
  sd.xlnx_sdhc.sdmmc:
    filter: dt_alias_exists("sdhc0") and CONFIG_XLNX_SDHC
    platform_allow:
      - versal2_rpu
      - versalnet_rpu
    extra_args: "DTC_OVERLAY_FILE=boards/versal.overlay"
