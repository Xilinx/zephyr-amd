common:
  depends_on: sdhc
  tags:
    - drivers
    - sdhc
tests:
  sd.mmc:
    harness: ztest
    filter: dt_alias_exists("sdhc0") and dt_compat_enabled("zephyr,mmc-disk")
    tags: sdhc
    min_ram: 32
    integration_platforms:
      - mimxrt595_evk/mimxrt595s/cm33
  sd.xlnx_sdhc.mmc:
    filter: dt_alias_exists("sdhc0") and CONFIG_XLNX_SDHC
    platform_allow:
      - versal2_rpu
      - versalnet_rpu
    extra_args: "DTC_OVERLAY_FILE=boards/versal.overlay"
